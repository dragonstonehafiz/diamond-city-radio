name: diamondcityradio
description: "Diamond City Radio - A Fallout-inspired radio player with retro Pip-Boy interface."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  just_audio: ^0.9.40
  audio_service: ^0.18.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/data/songs/
    - assets/audio/sfx/
    - assets/audio/songs/
    - assets/audio/intros/
    - assets/audio/outros/
    - assets/audio/reports/
    - assets/images/reports/
    - assets/images/icons/

  fonts:
    - family: VT323
      fonts:
        - asset: assets/fonts/VT323-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icons/dcr_icon_color.png"
  web:
    generate: true
    image_path: "assets/images/icons/dcr_icon_color.png"
    background_color: "#141614"
    theme_color: "#6bff6b"
