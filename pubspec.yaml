name: diamondcityradio
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  just_audio: ^0.9.40
  audio_service: ^0.18.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/data/songs/
    - assets/audio/sfx/
    - assets/audio/songs/
    - assets/audio/intros/
    - assets/audio/outros/
    - assets/audio/reports/
    - assets/images/reports/
    - assets/images/icons/
